// ==========================================
//  CS:GO Legacy — Конфигурация сервера
// ==========================================

// --- Название и пароль ---
hostname "CSGO Server — Friends Only"
sv_password ""
rcon_password "changeme_rcon"

// --- Сетевые настройки ---
sv_maxrate 0
sv_minrate 128000
sv_mincmdrate 64
sv_maxcmdrate 128
sv_minupdaterate 64
sv_maxupdaterate 128

// --- Тикрейт (128 для комфортной игры) ---
// Задаётся при запуске через -tickrate 128

// --- Игровые настройки ---
mp_autoteambalance 1
mp_limitteams 1
mp_friendlyfire 0
mp_autokick 0
sv_kick_ban_duration 0

// --- Раунды ---
mp_maxrounds 30
mp_roundtime 1.92
mp_roundtime_defuse 1.92
mp_roundtime_hostage 1.92
mp_warmuptime 60
mp_freezetime 10
mp_buytime 20
mp_buy_anywhere 0

// --- Деньги ---
mp_startmoney 800
mp_maxmoney 16000
mp_afterroundmoney 0
cash_team_bonus_shorthanded 0

// --- Урон и геймплей ---
ff_damage_reduction_bullets 0.33
ff_damage_reduction_grenade 0.85
ff_damage_reduction_other 0.4
mp_death_drop_gun 1
mp_death_drop_grenade 2
mp_death_drop_defuser 1

// --- Пауза и голосование ---
sv_pausable 0
sv_allow_votes 1
sv_vote_allow_spectators 0

// --- Логирование ---
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0

// --- Режим. 0=casual, 1=competitive ---
game_type 0
game_mode 1

// --- Чит ---
sv_cheats 0

// --- LAN режим (обязателен для CS:GO Legacy) ---
sv_lan 1

// Отключение лобби-системы (сломана в Legacy)
sv_hibernate_when_empty 0

exec banned_user.cfg
exec banned_ip.cfg
